<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julia Tonello — Estratégia & Gestão de Redes Sociais para Restaurantes</title>
<meta name="description" content="Estratégia de redes sociais e gestão que realmente entrega resultado para restaurantes. Viral enche ego. Cliente enche mesa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-primary:#0a0a0a;
  --bg-secondary:#1a1a1a;
  --text-primary:#f5f5f5;
  --text-secondary:#a0a0a0;
  --accent:#c8a87c;
  --accent-bright:#d9bd97;
  --white:#ffffff;
  --border:#2a2a2a;
  --font-heading:'Playfair Display', Georgia, serif;
  --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-hand:'Caveat', cursive;
  --max-width:1200px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  background:var(--bg-primary);
  color:var(--text-primary);
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.grain-overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:9999;
  opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
::selection{background:var(--accent);color:var(--bg-primary);}
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:var(--bg-primary);}
::-webkit-scrollbar-thumb{background:var(--border);}
::-webkit-scrollbar-thumb:hover{background:var(--accent);}
.container{
  max-width:var(--max-width);
  margin:0 auto;
  padding:0 24px;
}
.nav{
  position:fixed;
  top:0;left:0;
  width:100%;
  z-index:1000;
  padding:20px 0;
  transition:all 0.4s ease;
  background:transparent;
}
.nav.scrolled{
  background:rgba(10,10,10,0.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:14px 0;
}
.nav-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.nav-logo{
  font-family:var(--font-heading);
  font-size:1.6rem;
  font-weight:700;
  color:var(--text-primary);
  text-decoration:none;
  letter-spacing:-0.5px;
}
.nav-logo span{color:var(--accent);}
.nav-links{
  display:flex;
  align-items:center;
  gap:32px;
  list-style:none;
}
.nav-links a{
  color:var(--text-secondary);
  text-decoration:none;
  font-size:0.9rem;
  font-weight:500;
  letter-spacing:0.3px;
  transition:color 0.3s ease;
  position:relative;
}
.nav-links a:hover{color:var(--text-primary);}
.nav-links a::after{
  content:'';
  position:absolute;
  bottom:-4px;left:0;
  width:0;height:1px;
  background:var(--accent);
  transition:width 0.3s ease;
}
.nav-links a:hover::after{width:100%;}
.nav-cta{
  border:1px solid var(--accent);
  color:var(--accent);
  padding:10px 22px;
  border-radius:2px;
  text-decoration:none;
  font-size:0.85rem;
  font-weight:600;
  letter-spacing:0.5px;
  transition:all 0.3s ease;
  background:transparent;
  cursor:pointer;
}
.nav-cta:hover{
  background:var(--accent);
  color:var(--bg-primary);
}
.hamburger{
  display:none;
  flex-direction:column;
  gap:5px;
  background:none;
  border:none;
  cursor:pointer;
  padding:8px;
  z-index:1001;
}
.hamburger span{
  width:26px;height:2px;
  background:var(--text-primary);
  transition:all 0.3s ease;
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(6px,6px);}
.hamburger.active span:nth-child(2){opacity:0;}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(6px,-6px);}
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  position:relative;
  padding:120px 0 80px;
  background:var(--bg-primary);
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse at 70% 30%, rgba(200,168,124,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 50%);
  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");
  opacity:0.06;
  pointer-events:none;
}
.hero-content{
  position:relative;
  z-index:2;
  max-width:900px;
}
.hero-eyebrow{
  font-family:var(--font-hand);
  font-size:1.8rem;
  color:var(--accent);
  margin-bottom:20px;
  display:block;
}
.hero h1{
  font-family:var(--font-heading);
  font-size:clamp(2.5rem, 7vw, 5.5rem);
  font-weight:800;
  line-height:1.05;
  letter-spacing:-1.5px;
  margin-bottom:32px;
  color:var(--text-primary);
}
.hero h1 .highlight{
  color:var(--accent);
  font-style:italic;
}
.hero h1 .strike{
  position:relative;
  display:inline-block;
}
.hero h1 .strike::after{
  content:'';
  position:absolute;
  top:55%;left:-5%;
  width:110%;height:4px;
  background:var(--accent);
  transform:rotate(-2deg);
}
.hero-sub{
  font-size:1.3rem;
  color:var(--text-primary);
  font-weight:400;
  max-width:620px;
  margin-bottom:16px;
  line-height:1.5;
}
.hero-sub-secondary{
  font-family:var(--font-hand);
  font-size:1.6rem;
  color:var(--text-secondary);
  margin-bottom:48px;
}
.hero-ctas{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:16px 32px;
  font-size:0.95rem;
  font-weight:600;
  letter-spacing:0.5px;
  text-decoration:none;
  border-radius:2px;
  transition:all 0.3s ease;
  cursor:pointer;
  border:none;
  font-family:var(--font-body);
}
.btn-primary{
  background:var(--accent);
  color:var(--bg-primary);
}
.btn-primary:hover{
  background:var(--accent-bright);
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(200,168,124,0.25);
}
.btn-outline{
  background:transparent;
  color:var(--text-primary);
  border:1px solid var(--border);
}
.btn-outline:hover{
  border-color:var(--accent);
  color:var(--accent);
}
section{padding:100px 0;position:relative;}
.section-label{
  font-family:var(--font-hand);
  font-size:1.5rem;
  color:var(--accent);
  margin-bottom:12px;
  display:block;
}
.section-title{
  font-family:var(--font-heading);
  font-size:clamp(2rem, 5vw, 3.5rem);
  font-weight:700;
  line-height:1.1;
  letter-spacing:-1px;
  margin-bottom:24px;
}
.section-intro{
  font-size:1.15rem;
  color:var(--text-secondary);
  max-width:680px;
  line-height:1.7;
}
.problem{
  background:var(--bg-secondary);
  text-align:center;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.problem .container{max-width:900px;}
.problem-eyebrow{
  font-family:var(--font-hand);
  font-size:1.6rem;
  color:var(--accent);
  margin-bottom:16px;
}
.problem h2{
  font-family:var(--font-heading);
  font-size:clamp(2.2rem, 6vw, 4.5rem);
  font-weight:800;
  line-height:1.1;
  margin-bottom:40px;
}
.problem-quote{
  font-family:var(--font-heading);
  font-style:italic;
  font-size:clamp(1.8rem, 4vw, 3rem);
  color:var(--text-primary);
  line-height:1.3;
  margin:40px 0;
  position:relative;
  padding:40px 0;
}
.problem-quote::before,
.problem-quote::after{
  content:'';
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:60px;height:1px;
  background:var(--accent);
}
.problem-quote::before{top:0;}
.problem-quote::after{bottom:0;}
.problem-quote .gold{color:var(--accent);font-weight:700;}
.problem-text{
  font-size:1.2rem;
  color:var(--text-secondary);
  max-width:640px;
  margin:0 auto;
  line-height:1.7;
}
.services{
  background:var(--bg-primary);
}
.services-header{
  text-align:center;
  margin-bottom:70px;
}
.services-header .section-intro{margin:0 auto;}
.services-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:32px;
}
.service-card{
  background:var(--bg-secondary);
  border:1px solid var(--border);
  padding:48px 40px;
  border-radius:4px;
  transition:all 0.4s ease;
  position:relative;
  overflow:hidden;
}
.service-card::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:100%;height:3px;
  background:var(--accent);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform 0.4s ease;
}
.service-card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
}
.service-card:hover::before{transform:scaleX(1);}
.service-number{
  font-family:var(--font-heading);
  font-size:3.5rem;
  font-weight:800;
  color:var(--accent);
  opacity:0.25;
  line-height:1;
  margin-bottom:16px;
}
.service-card h3{
  font-family:var(--font-heading);
  font-size:1.8rem;
  font-weight:700;
  margin-bottom:20px;
  line-height:1.2;
}
.service-card ul{
  list-style:none;
  margin-bottom:28px;
}
.service-card ul li{
  padding:10px 0;
  color:var(--text-secondary);
  font-size:0.98rem;
  border-bottom:1px solid var(--border);
  position:relative;
  padding-left:24px;
}
.service-card ul li::before{
  content:'—';
  position:absolute;
  left:0;
  color:var(--accent);
}
.service-card ul li:last-child{border-bottom:none;}
.service-for{
  padding-top:24px;
  border-top:1px solid var(--border);
}
.service-for-label{
  font-family:var(--font-hand);
  font-size:1.3rem;
  color:var(--accent);
  margin-bottom:6px;
}
.service-for-text{
  font-size:1.05rem;
  color:var(--text-primary);
